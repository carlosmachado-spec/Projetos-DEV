<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNotes</title>
    <script src="./JavaScript/script.js" defer></script>
    <link rel="stylesheet" href="./style.css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>
    <header>
        <h1>DevNotes</h1>
        <div id="searchContainer">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisar...">
        </div>

        <button id="exportsNotes">
            Exportar CSV <i class="bi bi-download"></i>
        </button>
    </header>

    <div id="addNoteContainer">
        <input type="text" id="noteContent" placeholder="Oque Deseja anotar ?">
        <button class="addNote"><i class="bi bi-plus-lg"></i></button>
    </div>

    <div id="notesContainer">
    </div>

    </div>
</body>

</html>
