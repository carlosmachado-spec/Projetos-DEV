<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Calculadora de IMC</title>
</head>

<body>
    <div id="container">
        <div id="calcContainer" >
            <h2>Calculadora de IMC</h2>
            <form id="imcForm">
                <div id="formInputs">
                    <div id="formControls">
                        <label for="height">Altura</label>
                        <input type="text" name="height" id="height" placeholder="Exemplo 1,75">
                    </div>
                    <div id="formControl">
                        <div id="formControls">
                            <label for="weight">Peso</label>
                            <input type="text" name="weight" id="weight" placeholder="Exemplo 70,5">
                        </div>
                    </div>
                </div>
                <div id="actionControl">
                    <button id="calcBtn">Calcular</button>
                    <button id="clearBtn">Limpar</button>
                </div>
            </form>
        </div>
        <div id="resultContainer" class="hide">
            <p id="imcNumber">Seu IMC:<span ></span>25</p>
            <p id="imcInfo">Situalção Atual:<span >Magreza</span></p>
            <h3>Confira as Classificações</h3>
            <div id="imcTable">
                <div id="tableHeader">
                    <h4>IMC</h4>
                    <h4>Classificação</h4>
                    <h4>Obesidade</h4>
                </div>
                <button id="backBtn">Voltar</button>
            </div>
        </div>
    </div>
</body>

</html>
