<link rel="stylesheet" href="../css/style.css" />
<body>
  <div class="background">
    <div class="login">
      <h1>Bridge Host</h1>
      <p>A ponte que conecta você ao seu hosteamento.</p>
      <form class="formLogin">
        <div>
          <label for="email" class="email">Seu e-mail </label>
          <input
            type="email"
            name="email"
            placeholder="Digite seu Email"
            class="block"
            required
          />
        </div>
        <div>
          <label for="password" class="password">Sua senha </label>
          <input
            type="password"
            name="password"
            placeholder="Digite sua senha"
            class="block"
            required
          />
        </div>
        <div class="options">
          <a href="#">Esqueceu senha</a>
          <a href="register.html">Criar Conta</a>
        </div>
      </form>
      <button type="submit" class="btnGeral">Login</button>
    </div>
  </div>
</body>
