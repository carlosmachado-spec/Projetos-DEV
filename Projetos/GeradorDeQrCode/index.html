<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projetos/GeradorDeQrCode/css/style.css">
    <script src="/Projetos/GeradorDeQrCode/js/script.js" defer></script>
    <link rel="qrcode" href="/Projetos/GeradorDeQrCode/img/icon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Gerador de QR Code</title>
</head>
<body>
    <div id="container">
        <header id="qrHeader">
            <h1>Gerador de QR Code</h1>
            <p>Digite o texto ou URL para gerar o QR Code</p>
        </header>
        <div id="qrForm">
            <input type="text" id="qrInput" placeholder="Digite o texto ou URL para gerar o QR Code">
            <button>Gerar QR Code</button>
        </div>
        <div id="qrCode">
            <img src="" alt="QR Code Gerado" id="qrImage">
        </div>
    </div>
</body>
</html>
